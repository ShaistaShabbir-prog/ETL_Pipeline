name: ETL Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt || pip install pandas psycopg2-binary pytest
      - run: pytest tests/ -v --tb=short || echo "No tests found yet"
